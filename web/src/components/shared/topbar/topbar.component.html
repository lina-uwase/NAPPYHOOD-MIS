<nav class="fixed top-0 right-0 bg-white border-b border-gray-200 px-4 py-3 shadow-sm z-50 transition-[left] duration-300"
     [ngClass]="isSidebarCollapsed ? 'left-[60px]' : 'left-60'">
  <div class="flex items-center justify-between">
    
    <div class="flex items-center space-x-4">
      <!-- <h1 class="text-lg font-semibold text-gray-800 hidden sm:block">Dashboard</h1> -->
    </div>

    <div class="flex items-center space-x-3">
      
      <div class="relative">
        <p-button 
          icon="pi pi-bell" 
          [text]="true" 
          [rounded]="true"
          severity="secondary"
          class="notification-btn"
          [pTooltip]="'Notifications'"
          tooltipPosition="bottom"
          (onClick)="onNotificationClick()">
        </p-button>
        <span class="absolute -top-1 -right-1 bg-red-500 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center">
          {{ notificationCount }}
        </span>
      </div>

      <div class="flex items-center space-x-2">
        <div class="hidden md:block ">
          <p class="text-sm font-medium text-gray-900">{{ currentUser?.name || 'Guest' }}</p>
          <p class="text-xs text-gray-900">{{ currentUser?.role || 'User' }}</p>
        </div>
        <p-avatar 
          [image]="currentUser?.avatar"
          [label]="!currentUser?.avatar ? (currentUser?.name || 'G').slice(0,1) : undefined"
          size="large"
          styleClass="cursor-pointer border border-gray-200"
          (onClick)="toggleUserMenu()"
        ></p-avatar>
      </div>
   
    </div>
  </div>
</nav>
