  <!-- Right Panel -->
  <div class="w-1/2 bg-gray-50 flex items-center justify-center">
    <div class="bg-white rounded-2xl border border-gray-200 shadow-md p-12 w-full max-w-xl min-h-[450px] flex flex-col justify-center space-y-8">
      <div>
        <h2 class="text-2xl font-bold text-gray-900">Sign In</h2>
        <p class="mt-2 text-gray-600">Welcome back, enter your credentials to continue</p>
      </div>

      <!-- Messages -->
      <div *ngIf="successMessage" class="p-3 bg-green-50 border border-green-200 rounded-md mb-4">
        <div class="flex">
          <svg class="w-5 h-5 text-green-400 mr-2" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
          </svg>
          <p class="text-sm text-green-600">{{ successMessage }}</p>
        </div>
      </div>
      
      <div *ngIf="errorMessage" class="p-3 bg-red-50 border border-red-200 rounded-md mb-4">
        <div class="flex">
          <svg class="w-5 h-5 text-red-400 mr-2" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          <p class="text-sm text-red-600">{{ errorMessage }}</p>
      </div>
      </div>

      <form class="space-y-6" [formGroup]="loginForm" (ngSubmit)="onSubmit()">
        <!-- Email/Phone -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email or phone number</label>
          <input 
            type="text" 
            formControlName="emailOrPhone"
            class="w-full px-3 py-2 border border-gray-300 rounded-md placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#5A8621]"
            placeholder="Enter email or phone number">
          <div *ngIf="loginForm.get('emailOrPhone')?.invalid && loginForm.get('emailOrPhone')?.touched" class="text-red-500 text-xs mt-1">
            Please enter a valid email or phone number.
          </div>
        </div>

        <!-- Password -->
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
          <div class="relative">
            <input 
              [type]="showPassword ? 'text' : 'password'" 
              formControlName="password"
              class="w-full px-3 py-2 border border-gray-300 rounded-md placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-[#5A8621]"
              placeholder="Password">
            <button type="button" (click)="showPassword = !showPassword" 
              class="absolute right-2 top-1/2 transform -translate-y-1/2 text-gray-500 focus:outline-none">
              <ng-container *ngIf="!showPassword">
                <!-- Eye Icon -->
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.477 0 8.268 2.943 9.542 7-1.274 4.057-5.065 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
                </svg>
              </ng-container>
              <ng-container *ngIf="showPassword">
                <!-- Eye Off Icon -->
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.477 0-8.268-2.943-9.542-7a9.956 9.956 0 012.293-3.95m3.362-2.676A9.953 9.953 0 0112 5c4.477 0 8.268 2.943 9.542 7a9.978 9.978 0 01-4.043 5.306M15 12a3 3 0 11-6 0 3 3 0 016 0zm-6.364 6.364L6 18m12-12l-1.414 1.414M3 3l18 18" />
                </svg>
              </ng-container>
            </button>
          </div>
          <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched" class="text-red-500 text-xs mt-1">
            Password must be at least 8 characters, include a number, a capital letter, and a special character.
          </div>
        </div>

        <!-- Remember Me / Forgot Password -->
        <div class="flex items-center justify-between">
          <div class="flex items-center">
            <input id="remember-me" type="checkbox" class="h-4 w-4 text-blue-600 border-gray-300 rounded">
            <label for="remember-me" class="ml-2 block text-sm text-gray-900">Remember me</label>
          </div>
          <div class="text-sm">
            <a routerLink="/forgot-password" class="text-[#5A8621] hover:underline">Forgot password?</a>
          </div>
        </div>

        <!-- ✅ Updated Button -->
        <button 
          type="submit" 
          [disabled]="loginForm.invalid"
          [ngStyle]="{
            'background-color': loginForm.valid ? '#5A8621' : '#9BB879'
          }"
          class="w-full py-2.5 px-4 text-sm font-medium text-white rounded-md focus:ring-2 focus:ring-[#5A8621] disabled:cursor-not-allowed">
          Login
        </button>

      </form>
    </div>
  </div>
</div>
